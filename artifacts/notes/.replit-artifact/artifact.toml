kind = "web"
previewPath = "/notes/"
title = "EdgeIQ Notes"
version = "1.0.0"
id = "artifacts/notes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/notes/" ]
localPort = 25960

[services.development]
run = "pnpm --filter @workspace/notes run dev"

[services.production]
run = "python3 -m http.server 25960 --directory /home/runner/workspace/artifacts/notes/dist/public"

[services.env]
PORT = "25960"
BASE_PATH = "/notes/"
