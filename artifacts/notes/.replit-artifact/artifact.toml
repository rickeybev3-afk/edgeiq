kind = "web"
previewPath = "/notes/"
title = "EdgeIQ Notes"
version = "1.0.0"
id = "artifacts/notes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/notes/" ]
localPort = 25960

[services.development]
run = "pnpm --filter @workspace/notes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/notes", "run", "build" ]
publicDir = "artifacts/notes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25960"
BASE_PATH = "/notes/"
