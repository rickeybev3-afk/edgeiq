kind = "web"
previewPath = "/"
title = "EdgeIQ Dashboard"
version = "1.0.0"
id = "artifacts/edgeiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23411

[services.development]
run = "cd /home/runner/workspace && streamlit run app.py --server.port 23411"

[services.production]
run = "cd /home/runner/workspace && PORT=8080 python3 deploy_server.py"

[services.env]
PORT = "23411"
BASE_PATH = "/"
