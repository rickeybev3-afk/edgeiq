[[services]]
localPort = 8080
name = "Start application"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace && streamlit run app.py --server.port 8080"

[services.production]
run = "cd /home/runner/workspace && PORT=8080 python3 deploy_server.py"

[services.env]
PORT = "8080"
