kind = "web"
previewPath = "/api-server/"
title = "EdgeIQ Dashboard"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/api-server/" ]
localPort = 22729

[services.development]
run = "cd /home/runner/workspace && streamlit run app.py --server.port 22729"

[services.production]
run = "bash /home/runner/workspace/start.sh"

[services.env]
PORT = "22729"
BASE_PATH = "/api-server/"
