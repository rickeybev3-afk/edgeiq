kind = "web"
previewPath = "/"
title = "EdgeIQ Dashboard"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "streamlit run app.py --server.port 8080"

[services.production]
run = "bash /home/runner/workspace/start.sh"

[services.env]
PORT = "8080"
BASE_PATH = "/"
