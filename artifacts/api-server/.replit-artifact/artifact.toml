kind = "web"
previewPath = "/notes-static/"
title = "EdgeIQ Notes (static)"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/notes-static/" ]
localPort = 1104

[services.development]
run = "python3 -m http.server 1104 --directory /home/runner/workspace/artifacts/api-server/public"

[services.production]
run = "python3 -m http.server 1104 --directory /home/runner/workspace/artifacts/api-server/public"

[services.env]
PORT = "1104"
BASE_PATH = "/"
