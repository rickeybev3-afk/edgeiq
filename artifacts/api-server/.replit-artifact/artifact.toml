kind = "web"
previewPath = "/"
title = "EdgeIQ Notes"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22729

[services.development]
run = "cd /home/runner/workspace && streamlit run app.py --server.port 22729"

[services.production]
build = [ "echo", "static-build-ready" ]
publicDir = "artifacts/api-server/dist/public"
serve = "static"

[services.env]
PORT = "22729"
BASE_PATH = "/"
