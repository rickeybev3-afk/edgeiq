kind = "web"
previewPath = "/"
title = "EdgeIQ Dashboard"
version = "1.0.0"
id = "artifacts/api-server"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
run = "bash /home/runner/workspace/start.sh"

[services.env]
PORT = "3001"
BASE_PATH = "/"
