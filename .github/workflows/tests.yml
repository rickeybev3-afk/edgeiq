name: Python Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system \
            "alpaca-py>=0.43.2" \
            "fpdf>=1.7.2" \
            "numpy>=2.4.4" \
            "openpyxl>=3.1.5" \
            "pandas>=2.3.3" \
            "plotly>=6.6.0" \
            "pytz>=2026.1.post1" \
            "requests>=2.33.0" \
            "streamlit>=1.55.0" \
            "streamlit-lightweight-charts>=0.7.20" \
            "pytest>=9.0" \
            "supabase>=2.28.3" \
            "apscheduler>=3.10"

      - name: Run tests
        run: python -m pytest -v --tb=short
