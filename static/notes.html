const KEY="a5e1fcab-8369-42c4-8550-a8a19734510c";const raw="<div class=\"bn-section bn-status\">\n\n# \u26a1 STATUS DASHBOARD\n*Last updated: April 19, 2026*\n\n| | |\n|---|---|\n| **Current Phase** | Phase 1.5 \u2014 Paper execution live (Alpaca) |\n| **Phase 2 Target** | ~May 6, 2026 \u2014 flip `IS_PAPER_ALPACA=false` |\n| **PDT Constraint** | Live: max 3 day trades/5-day window until account reaches $25k (~3 weeks at compounding pace) |\n| **Bot Status** | \ud83d\udfe2 Running \u2014 TCS\u226550 intraday / TCS\u226560 morning |\n| **Validation Gate** | 30 settled trades \u00b7 \u226560% WR \u00b7 30 days |\n| **Active Tiers** | P3(morning\u226570) P1(intraday\u226570) P2a(intraday 60-69) P2b(intraday 50-59) P4(morning 60-69) |\n| **Signal Supply** | ~10.1/day \u00b7 2,547/yr (uncapped backtest signal rate \u2014 not execution count) |\n| **Live Sim Execution** | ~1,350/yr at current Max trades/day cap (~5.4/day) \u00b7 $5.58M filter sim baseline |\n| **VWAP Filter** | \ud83d\udd34 DISABLED everywhere \u2014 adds no edge (confirmed Apr 19) |\n| **Sim Version** | v6 (S/R wall exits \u2014 realistic, not MFE) |\n| **Stop System** | IB-based (entry=IB high/low, stop=IB low/high) \u2014 smart stop NOT used |\n| **Sizing** | 2.1% of equity/trade \u00b7 $2k risk cap at ~$95k equity |\n| **Alpaca Plan** | $99/month Algo Trader Plus (5+ yr minute bars) |\n| **Tiingo reminder** | ~April 22 \u2014 buy $10/mo plan (survivorship fix) |\n\n</div>\n\n---\n\n<div class=\"bn-section bn-phase\">\n\n# \ud83d\uddfa\ufe0f PHASE TRACKER\n\n| Phase | Name | Gate | Status |\n|---|---|---|---|\n| **1** | Manual signal validation | 150+ predictions, 60% WR | \u2705 Complete |\n| **1.5** | Paper execution live (Alpaca) | 30 trades, 60% WR, 30 days | \ud83d\udfe1 Active \u2014 started Apr 2026 |\n| **2** | Flip to live money | One line: `IS_PAPER_ALPACA=false` | \u23f3 ~May 6, 2026 |\n| **3** | Brain self-optimizes | ~500 trades, TCS auto-calibrates | \ud83d\udd35 Future |\n| **4** | Collective intelligence | ~2,000+ users, brain licensing | \ud83d\udd35 Future |\n| **5** | Meta-brain + marketplace | 18\u201330 months, $4.5M ARR target | \ud83d\udd35 Future |\n| **6** | Asset class expansion | Futures, crypto, options | \ud83d\udd35 2.5\u20133.5 yrs |\n| **7** | Institutional data licensing | Behavioral dataset sale | \ud83d\udd35 3.5\u20135 yrs |\n\n**Stage 3 milestone confirmed April 13, 2026:** Live infrastructure + 5-year validated backtest at scale. Valuation range: $100K\u2013$400K.\n\n### Standing Build Rules\n- Any function signature, threshold, constant, or behavior change \u2192 update the section that documents it\n- New features \u2192 new dated entry in Session Log with: what it does, where in code, why\n- If a prior section is now wrong \u2192 mark it `~~stale~~` or update inline with `(updated YYYY-MM-DD)`\n- Priority mandate: **P0 = bot stability. P1 = live data accuracy. P2 = analytics. Reject polish tasks at review.**\n\n</div>\n\n---\n\n<div class=\"bn-section bn-vision\">\n\n# \ud83c\udfaf PRODUCT VISION\n\n**EdgeIQ \u2014 \"Find your edge, then automate it.\"**\nPersonal win-rate calibration engine + autonomous trading system for small-cap volume profile trading.\n- Stack: Python Streamlit (port 8080), Alpaca API, Supabase, Plotly \u2014 dark mode\n- Differentiator: NOT a generic screener. Learns YOUR specific edge. Automates it. Then builds a marketplace of proven edges.\n- Competitors: Trade Ideas, Tradervue, StocksToTrade \u2014 none do personal calibration, none have a data moat\n\n### Subscription Tiers\n| Tier | Price | Description |\n|---|---|---|\n| Starter | $49/mo | Journal + calibration + edge analytics |\n| Pro | $99/mo | Full scanner + alerts + paper trading |\n| Autonomous | $199/mo | Live trading enabled after edge proven |\n| Meta-Brain | $999/mo | Dynamic routing across verified profiles |\n| Institutional | $5,000\u2013$15,000/mo | Signal output for prop traders/funds |\n\n### Combined Exit Valuation\n| Component | Conservative | Optimistic |\n|---|---|---|\n| EdgeIQ SaaS (Phase 5) | $36M | $67M |\n| EdgeIQ data moat (institutional) | $50M | $500M |\n| Cognitive profiler (HR SaaS) | $150M | $450M |\n| Combined dataset premium | +$50M | +$200M |\n| **Combined total** | **~$300M** | **~$1.2B** |\n\n</div>\n\n---\n\n<div class=\"bn-section bn-algo\">\n\n# \ud83d\udd2c ALGORITHM CORE\n\n## TCS \u2014 Trade Confidence Score (0\u2013100)\n\n**Internal formula \u2014 40/30/30 hardcoded split:**\n- **Range Factor (40 pts):** `range_ratio = total_day_range / ib_range`. \u22652.5 = full 40; 1.1\u20132.5 = linear; \u22641.1 = 0\n- **Velocity Factor (30 pts):** `velocity_ratio = avg_vol_last_3_bars / avg_vol_session`. \u22652.0 = full; 1.0\u20132.0 = linear\n- **Structure Factor (30 pts):** Price > 1 ATR from POC AND last 3 closes trending further from POC \u2192 full 30\n- **Sector Bonus (+10 pts optional):** Sector ETF up >1% \u2192 +10\n\n**Important clarification (April 18):**\n- The 40/30/30 *component split* is hardcoded. Phase 2 target: auto-calibrate per user.\n- The *per-structure TCS floor thresholds* DO self-calibrate nightly via `compute_structure_tcs_thresholds()`.\n- TCS correlates with follow-through SIZE, not direction accuracy (proven April 13 empirically \u2014 93% WR holds across TCS 40\u201390).\n\n**Per-structure TCS thresholds (post Apr 18 fix):**\n| Structure | TCS Floor | Mode |\n|---|---|---|\n| Double Distribution | 48 | Backtest prior (8 live trades) |\n| Neutral Extreme | 53 | Live dominates (165 live) |\n| Trend Day | 54 | Live only |\n| Normal Variation | 57 | Backtest prior (0 live) |\n| Neutral | 62 | Live dominates (352 live) |\n| Normal | 64 | Live only |\n| Rotational | 65 | No data \u2014 defaults to BASE_TCS |\n\n**Live-first blending fix (Apr 18, backend.py ~line 3737):**\n- Phase 1 (live < 30 trades for structure): Backtest dominates as prior\n- Phase 2 (live \u2265 30 trades): Backtest capped at `live_n \u00d7 2.0`. Live data always full weight.\n\n## RVOL \u2014 Relative Volume\n\n- **Main chart:** 50-day baseline, 390-element minute-by-minute curve\n- **Playbook screener:** 10-day baseline (more responsive)\n- **Gap scanner PM:** 10-day pre-market average\n- **Scanner RVOL filter (built Apr 12):** `min_rvol` slider, default 2.0\u00d7\n- Bands: `3+` extreme | `2\u20133` high | `1\u20132` normal | `<1` caution\n\n## Exit Strategy\n\n**Current live bot (Phase 1.5):** 50/25/25 ladder\n- 50% off at 1R \u2192 stop to breakeven \u2192 25% off at 2R \u2192 25% runner to close\n\n**Sim versions:**\n- `pnl_r_sim` = MFE-based (best possible \u2014 v5/v6 S/R wall exits)\n- `eod_pnl_r` = held to close (realistic floor)\n- `tiered_pnl_r` = 50/25/25 ladder (what bot actually executes)\n\n**MFE explained:** Maximum Favorable Excursion \u2014 highest point trade reached in your favor before close. The v6 adaptive exits use S/R wall detection to approximate MFE (exit near resistance = realistic). Not fantasy \u2014 just the ceiling you'd capture with ideal timing.\n\n**v6 (current) vs v5:** v6 uses S/R wall exits (realistic). v5 used peak MFE (optimistic). v6 is honest, not worse. Paper trade improvement: +1.512R \u2192 +1.689R confirms v6 strategy works.\n\n## IB-Range Position Sizing Multiplier\n| IB Range % | Win Rate | Avg R | Size Multiplier |\n|---|---|---|---|\n| < 2% | 89.5% | +4.32R | **2.00\u00d7** |\n| 2\u20134% | 85.3% | +1.24R | **1.30\u00d7** |\n| 4\u20136% | 83.6% | +0.99R | **1.00\u00d7** (base) |\n| 6\u20138% | 82.9% | +0.77R | **0.75\u00d7** |\n| 8\u201310% | 82.6% | +0.88R | **0.80\u00d7** |\n\n*Location: `paper_trader_bot.py` lines 405\u2013423 (`_IB_RANGE_MULT` + `_ib_size_mult()`)*\n\n## Target Zones (Dynamic)\n1. **Coast-to-Coast:** IB violated \u2192 price returns inside \u2192 target = opposite IB boundary\n2. **Range Extensions (TCS > 70):** 1.5\u00d7 and 2.0\u00d7 IB range from breakout side\n3. **Gap Fill:** Double distribution LVN detected \u2192 target = opposite HVN\n4. **Volume profile levels**\n5. **Fallback:** IB extensions at 1.0\u00d7, 1.5\u00d7, 2.0\u00d7\n\n</div>\n\n---\n\n<div class=\"bn-section bn-arch\">\n\n# \ud83c\udfd7\ufe0f ARCHITECTURE\n\n## HARD PRESERVATION \u2014 NEVER MODIFY\n- `compute_buy_sell_pressure()`\n- `classify_day_structure()`\n- `compute_structure_probabilities()`\n- `brain_weights.json`\n- **Separation rule:** math/logic \u2192 `backend.py` only; UI/rendering \u2192 `app.py` only\n\n## Data Flow Map\n```\nJournal Tab (pre-market predictions)\n    \u2193 verify button EOD\nwatchlist_predictions table\n    \u2193 verify_watchlist_predictions()\naccuracy_tracker table \u2190\u2500\u2500 also fed by manual log_accuracy_entry()\n    \u2193\nrecalibrate_from_supabase() [4:10 PM daily]\n    \u2191\npaper_trades table \u2190\u2500\u2500 bot logs at 10:35 AM, outcomes at 4:05 PM\n    \u2193\nvolume-weighted blend per structure (\u2265MIN_SAMPLES each)\n    \u2193\nbrain_weights \u2192 Supabase per-user prefs\n    \u2193\nTCS scoring uses updated weights next morning\n```\n\n## Two-Layer Brain Architecture\n\n**Layer 1 \u2014 Personal brain (built):**\nEach user's complete trading profile calibrates to their individual performance:\n- Brain weights per structure type (win rates, confidence per classification)\n- Full trade journal history (A/B/C/F grades, P&L)\n- TCS calibration per setup type\n- RVOL/gap% bands per outcome\n- Nightly confidence rankings (0\u20135)\n- Position sizing history and risk patterns\n\n**Layer 2 \u2014 Collective brain (to build):**\nAnonymized outcomes from ALL users, pooled. Min n=50 per structure before collective influences signal. Personal layer always overrides collective \u2014 your edge > collective average.\n\n**Why never mix personal weights:** User A crushes Trend Days (90% WR). User B crushes Neutral (85%). Averaging = mediocre 60% for both. Personalization IS the product.\n\n## Bot Schedule\n- **10:35 AM ET:** Morning scan \u2192 paper orders placed (Alpaca)\n- **4:05 PM ET:** EOD outcome update\n- **4:10 PM ET:** Brain recalibration\n- **4:25 PM ET:** Watchlist prediction verification\n\n## Key Constants\n- `SIM_VERSION = \"v6\"` \u2014 backend.py line ~10883\n- `IS_PAPER_ALPACA = True` \u2014 flip to `False` for Phase 2\n- `IB_RANGE_PCT_THRESHOLD = 10.0` \u2014 configurable in UI, stored in app_config / local JSON\n- `_HIST_CAP_MULT = 2.0` \u2014 TCS calibration live-first blending cap\n- `_LIVE_MIN_OVERRIDE = 30` \u2014 min live trades before live data overrides backtest prior\n\n## Alpaca Data Access\n- **Free tier:** ~2 years minute bars\n- **$99/month Algo Trader Plus (current):** 5+ years minute bars (back to ~2016)\n- **5-year backtest feasibility:** Yes, the data is already accessible with current plan\n- **Test:** Run batch backtest against 2019 date range to confirm availability for specific tickers\n\n</div>\n\n---\n\n<div class=\"bn-section bn-data\">\n\n# \ud83d\udcca BACKTEST VALIDATION\n\n## 5-Year Results (April 13, 2026)\n**32,685 rows | 1,260 trading days | 5 market regimes**\n\n| Metric | 1-Year | 5-Year |\n|---|---|---|\n| Overall WR | 85.4% | **85.7%** |\n| Train WR | 85.5% | **86.2%** |\n| Test WR | 85.2% | **83.8%** |\n| Train/Test gap | 0.3pp | **2.4pp** |\n\n**5 regimes covered:** COVID crash (2020) \u00b7 Meme stock mania (2021) \u00b7 Bear market -27% (2022) \u00b7 Recovery + AI bull (2023\u201324) \u00b7 Macro volatility (2025\u201326)\n\n**Key finding:** WR barely moved across all regimes. The edge is structural, not regime-dependent. 2.4pp train/test gap is far below industry norm of 10\u201320pp \u2014 proves the model reads real institutional behavior, not noise.\n\n**By filter:**\n| Filter | Win Rate | N |\n|---|---|---|\n| All setups | 81.8% | 21,680 resolved |\n| Morning scan only | 86.3% | 12,145 |\n| TCS \u2265 60 | **95.3%** | 1,823 |\n| Ntrl Extreme structure | 92% | 10,757 |\n\n## Batch Backtest Filter Funnel (current, no VWAP)\n| Stage | WR | Avg R | N |\n|---|---|---|---|\n| All Breakout Trades | ~42% | +0.050R | ~33,776 |\n| + TCS \u2265 50 | ~74% | +1.833R | ~5,856 |\n| + IB < 10% | ~75% | +1.946R | ~5,271 |\n\n**VWAP note:** The VWAP filter was removing 2,419/5,271 valid trades and is now OFF by default. Counter-VWAP setups at TCS\u226550 + IB<10% remain profitable.\n\n## P1\u2013P4 Trade Frequency (from 1,201 trading days)\n| Tier | Trades/yr | Expectancy | $/yr ($500R) |\n|---|---|---|---|\n| P3 \ud83d\udfe1 (best) | 24 | +6.36R | $76,320 |\n| P1 \ud83d\udd34 | 105 | +3.66R | $192,150 |\n| P2 \ud83d\udfe0 | 46 | +1.70R | $39,100 |\n| P4 \ud83d\udfe2 | 19 | +1.48R | $14,060 |\n| **Best-signal total** | **194** | **+3.19R avg** | **~$321,630** |\n\nDays with zero signal: 19.3% (~49/yr). Never skip a P3 setup.\n\n## At-Scale Projections (with compounding, $1,500 positions, 10% stop = 1R = $150)\n- **Expected weekly P&L (base case):** ~$400\u2013$500 (~3 wins, 1 loss at 75% WR)\n- **Per full win (50/25/25 ladder):** ~$206 (+1.37R avg)\n- **$7.42M from $1,500 context:** Valid math IF 75% WR + compounding holds for full year. Realistic modifier: some weeks choppy, some runners extend. True range: exceptional weeks vs flat weeks. The structural edge is real \u2014 the exact number depends on market conditions.\n\n## Regime Segmentation (planned, not yet built)\n- Tag each trading day: VIX level, SPY trend, sector rotation phase, gap-up vs gap-down open\n- Slice 5,271-trade dataset by regime tags \u2014 does 75% WR hold in all regimes?\n- Alpaca $99/month gives the 5+ year minute data needed for this analysis\n- This is the biggest upgrade path after 50-trade live validation\n\n</div>\n\n---\n\n<div class=\"bn-section bn-live\">\n\n# \ud83d\udcc8 LIVE BOT LOG\n\n## Bot P&L (Cumulative)\n| Date | Wins | Losses | WR | Sim P&L | Running Total |\n|---|---|---|---|---|---|\n| 2026-04-14 | 3 | 1 | 75.0% | +$13.42 | +$13.42 |\n| 2026-04-15 | 12 | 3 | 80.0% | +$155.71 | +$169.13 |\n| 2026-04-16 | 52 | 24 | 68.4% | +$1,401.01 | +$1,570.14 |\n| 2026-04-17 | 125 | 96 | 56.6% | +$1,395.70 | +$2,965.84 |\n\n*Note: April 16\u201317 WR includes ALL TCS levels (no floor filter). Bot takes P1/P2/P3 across full TCS\u226550 range.*\n\n## Brain Weight History\n| Date | trend_bull | trend_bear | normal | neutral | ntrl_extreme |\n|---|---|---|---|---|---|\n| 2026-04-10 | 1.0000 | 1.0000 | 1.2224 | 1.0499 | 1.0499 |\n| 2026-04-14 | 1.0000 | 1.0000 | 1.3334 | 1.0790 | 0.9214 |\n| 2026-04-15 | 1.0000 | 1.0000 | 1.3334 | 1.0061 | 0.9752 |\n| 2026-04-16 | 1.0000 | 1.0000 | 1.3334 | 1.0003 | 0.9985 |\n| 2026-04-17 | 1.4420 | 0.8443 | 1.3917 | 0.7617 | 0.9999 |\n\n## Structure WR (Live Accuracy Tracker)\n\u26a0\ufe0f **Correction (April 11):** True accuracy after filtering '\u2014' non-predictions = **40.7% (33/81)**. The 71.6% / 121/169 figures included non-predictions counted as correct \u2014 do not cite.\n\n## Current Bot Settings\n- TCS threshold: per-structure calibrated (see TCS section above)\n- IB range max: 10.0% of open price\n- VWAP alignment: **DISABLED** (see Apr 18 decision)\n- Position size: 1% equity, IB-range multiplier applied, $2K cap\n- Risk per trade: 1R = 10% stop on position size\n\n</div>\n\n---\n\n<div class=\"bn-section bn-backlog\">\n\n# \ud83d\udd32 BACKLOG\n\n## Priority 1 \u2014 Pre-Phase 2 (before live money)\n- [ ] **Slippage calibration** \u2014 Apply 0.75% haircut after first Alpaca fills come in (Monday/Tuesday). Log fill vs expected entry price on every order. *(pending:post-monday-fills)*\n- [ ] **Slippage auto-calibration** \u2014 After 20+ fills, rolling per-price-bucket average replaces generic 0.75%\n- [ ] **5-year regime segmentation** \u2014 Tag backtest_sim_runs rows by VIX/SPY/regime. Slice WR by regime to understand which market conditions favor IB breakouts most.\n\n## Priority 2 \u2014 Near-term\n- [ ] **Gap/trend screener** \u2014 The quantum computing screener (QBTS, RGTI, IONQ) built the \"trend\" scan type. Needs dedicated backtesting view to compare trend vs morning IB breakout WR.\n- [ ] **Market regime detection** \u2014 IWM/Russell daily trend as TCS \u00b15\u20138pt multiplier. Architecture ready; needs live data accumulation first.\n- [ ] **Webull CSV import** \u2014 Auto-map Webull trades \u2192 IB structure \u2192 accuracy_tracker\n- [ ] **Clean accuracy_tracker** \u2014 Remove tickers outside trading universe; skews structure weights\n- [ ] **Islamic compliance filter** \u2014 Musaffa API, Scanner tab toggle\n- [ ] **Clean up artifacts/api-server** \u2014 Failed workflow, not needed\n\n## Priority 3 \u2014 Phase 2+\n- [ ] **TCS component auto-calibration** \u2014 40/30/30 split should auto-adjust per user based on which component correlates with their wins\n- [ ] **RVOL lookback auto-adjustment** \u2014 Test which lookback (10/20/50 day) correlates best with wins per ticker type\n- [ ] **Tiingo $10/month** \u2014 Fixes survivorship bias (delisted stock data + historical fundamentals). *(~April 22)*\n- [ ] **Twitter/X account** \u2014 Start NOW, post journey not system. 60\u201390 days pre-launch audience building.\n- [ ] **Social media auto-poster** \u2014 Single compose \u2192 Twitter/X + Stocktwits + Reddit. Build after accounts have organic history.\n\n## Decided \u2014 Not Building\n- Monte Carlo panel in Analytics tab \u2014 removed; redundant with Live Sim in Backtest tab (both pull from same table)\n- Wednesday skip theory \u2014 unconfirmed, track live data before removing any days\n\n</div>\n\n---\n\n<div class=\"bn-section bn-decisions\">\n\n# \ud83d\uddd3\ufe0f SESSION LOG (newest first)\n\n---\n\n## Apr 19, 2026 (Evening) \u2014 TCS Tier Overhaul, Filter Alignment, Smart Stop Analysis\n\n### TCS Floor Changes (paper_trader_bot.py)\n- `MORNING_TCS_FLOOR` lowered 70\u219260 (line 421). Adds P4 tier: morning TCS 60-69, +0.366R / 36.9% WR, 203 trades/yr\n- Morning TCS 50-59 stays BLOCKED \u2014 negative expectancy confirmed in 5-yr data\n- `_struct_tcs_floor()` (line 356): intraday scans always use `max(MIN_TCS, regime_floor)` \u2014 bypasses per-structure nightly calibration entirely. Permanent code-level protection vs nightly tcs_thresholds.json overwrite\n\n### Active Tier System (P1\u2013P4)\n| Tier | Type | TCS | WR | R/trade | Trades/yr |\n|---|---|---|---|---|---|\n| P3 | Morning | \u226570 | 79.7% | +6.102R | 89 |\n| P1 | Intraday | \u226570 | 89.8% | +3.715R | 821 |\n| P2a | Intraday | 60-69 | \u2014 | \u2014 | 454 |\n| P2b | Intraday | 50-59 | 74.8% | +1.265R | 979 |\n| P4 | Morning | 60-69 | 36.9% | +0.366R | 203 |\n| BLOCKED | Morning | <60 | negative | \u2014 | \u2014 |\n\n**Total: 2,547 trades/yr \u00b7 ~10.1/day \u00b7 $5.58M filter sim (uses real entry/stop prices)**\n\n### Filter Simulation Tab (app.py ~line 11540)\n- TCS filter now scan-type aware (was flat TCS\u226550 for all): intraday \u2192 MIN_TCS=50, morning \u2192 max(per-structure, 60)\n- Matches `_struct_tcs_floor()` bot logic exactly \u2014 immune to nightly calibration file overwrites\n\n### Paper Trade Tab (app.py ~line 34124)\n- TCS filter now scan-type aware: explicit \"morning\" rows \u2192 TCS\u226560, intraday + unknown \u2192 TCS\u226550\n- Shows hypothetical view: how existing logged trades look under current bot rules\n\n### Smart Stop Analysis \u2014 NOT RECOMMENDED\n- Ran selective smart stop analysis: TCS\u226570 + IB\u22643% \u2192 99.3% WR, only 8 losses in 2.6 years, 0 false shakeouts\n- Morning TCS\u226570 + IB\u22643%: 100.0% WR across 162 trades \u2014 zero losses to protect against\n- Smart stop would cost -$231/yr (rare genuine losers would hit wider stop = -1.5R not -1.0R)\n- Decision: keep pure IB-based stops. Smart stop adds no value because these setups almost never lose.\n\n### VWAP Fix (pages/filter_sim.py)\n- `st.session_state[\"fs_use_vwap\"] = False` moved to after `st.set_page_config` (was before \u2014 caused Streamlit ordering conflict causing it not to apply)\n- VWAP now reliably defaults OFF on every page load\n\n### Sizing System (confirmed working)\n- `compute_risk_per_trade()`: fetches live Alpaca equity \u2192 2.1% of equity \u2192 cap at $2,000/trade\n- Shares = risk_dollars / stop_distance. Stop = IB low (bullish) or IB high (bearish)\n- At $7k start: ~$147/trade risk. Cap hits at ~$95k equity (~week 1 of compounding)\n\n---\n\n## Apr 19, 2026 (Session 2 \u2014 Afternoon) \u2014 Bot/Sim Filter Parity, Paper Trade Tab Fixes\n\n### Paper Trade Tab Bug Fixes (app.py)\n- Fixed 3 `UnboundLocalError` scoping bugs: stray `import pandas as pd`, `import plotly.graph_objects as go`, `import sys` inside `render_paper_trade_tab` were shadowing globals. Removed all three \u2014 globals at top of file cover them.\n- Paper trade display filter final state: **exact bot filter parity** (see below)\n\n### Paper Trade Display Filter (app.py ~line 34124)\n**Critical finding (Apr 19 Session 2):** Bot gate at line 916 skips if `predicted not in (\"Bullish Break\", \"Bearish Break\")` \u2014 meaning Neutral, Nrtl Extreme, Dbl Dist are ALL skipped as \"non_directional\". Previous filter (`!= \"Bearish Break\"`) was still showing these non-bot trades. Fixed.\n\nToggle added: \"Bot-eligible only\" (default ON) / \"All logged setups\" (OFF = historical/unfiltered view)\n\n**Bot-eligible filter (4 gates, applied only when toggle ON):**\n1. `predicted == \"Bullish Break\"` ONLY (not just \u2260 Bearish Break \u2014 Neutral/Nrtl Extreme/Dbl Dist are skipped by bot)\n2. TCS split floor: morning/NULL \u2192 \u226560, intraday \u2192 \u226550\n3. IB range < 10% (NULL passes \u2014 same as bot)\n4. RVOL \u2265 1.0 (NULL passes \u2014 same as bot)\n\n**All logged setups mode (toggle OFF):** shows every setup the scanner logged \u2014 full historical record including Neutral/Nrtl Extreme/Dbl Dist structure types that bot never traded.\n\n### Live Sim Filter Parity (pages/filter_sim.py)\nAll 3 gaps closed \u2014 live sim now matches bot exactly:\n1. **Bearish Break excluded** at DB query level (`.eq(\"actual_outcome\", \"Bullish Break\")`)\n2. **Split TCS floors enforced**: morning/NULL \u2192 \u226560, intraday \u2192 \u226550. Slider raises above bot minimums only.\n3. **RVOL \u2265 1.0 added as new funnel layer** (Layer 3 of 4, between IB and VWAP)\n- Funnel now: Bullish Breaks \u2192 TCS \u2192 IB \u2192 RVOL \u2192 Live Settings (5 cards)\n- `rvol` column added to DB select query\n\n### VWAP Toggle Fix (pages/filter_sim.py line 29)\n- Was: `st.session_state[\"fs_use_vwap\"] = False` (forced off every render \u2014 toggle permanently broken)\n- Now: `if \"fs_use_vwap\" not in st.session_state: st.session_state[\"fs_use_vwap\"] = False` (init-once)\n- Defaults OFF (no edge confirmed) but user can now enable it\n\n### Signal Supply vs Execution Clarification\n- **2,547/yr / 10.1/day** = uncapped backtest signal supply rate \u2014 how many qualifying signals exist\n- **923\u20131,350/yr** = actual execution at 6/day cap (Max trades/day slider)\n- Increasing slider to 20 approaches full signal supply (~5,271 Bullish Break signals in dataset)\n\n### Position Sizing \u2014 3-Layer Multiplier Stack (confirmed active)\nAll three multiply together; capped at 20\u00d7 starting risk ($3,000/trade):\n- **Tier mult**: P3 morning\u226570 \u2192 1.50\u00d7, P1 intraday\u226570 \u2192 1.25\u00d7, all others \u2192 1.00\u00d7\n- **RVOL bonus**: \u22653.5\u00d7 \u2192 1.50\u00d7, \u22652.5\u00d7 \u2192 1.25\u00d7, <2.5\u00d7 \u2192 1.00\u00d7\n- **IB tightness**: 0-2% \u2192 2.00\u00d7, 2-4% \u2192 1.30\u00d7, 4-6% \u2192 1.00\u00d7, 6-8% \u2192 0.75\u00d7, 8-10% \u2192 0.80\u00d7\n- Best case (P3 + RVOL\u22653.5\u00d7 + IB<2%): $150 \u00d7 1.50 \u00d7 1.50 \u00d7 2.00 = **$675 risk/trade**\n\n### Stop System \u2014 Current Design + Known Gaps (adjust as data comes in)\n**Active protection layers:**\n- Bracket orders: stop + target placed simultaneously at entry fill \u2014 automatic, no manual intervention\n- IB < 10% filter: wide-stop setups blocked before order placed\n- 2.1% risk cap: position sized to exactly 1R ($150 at $7k) on a clean fill\n- Force close 4:20 PM: all open positions closed before EOD \u2014 no overnight gap risk\n\n**Known gaps to monitor and potentially address:**\n1. **Halt/reopen gap** \u2014 stock halts mid-day, reopens well below stop \u2192 fills at reopen price, not stop price. Rare but real tail risk. Mitigation option: add halt-detection pre-order check or max loss circuit breaker per day.\n2. **Fast tape slippage** \u2014 news spike blows through stop level before fill executes. Most likely on thinner tickers. Mitigation: RVOL \u22651.0 filter already helps; could tighten to RVOL \u22651.5 if slippage shows up in data.\n3. **Partial entry fill** \u2014 entry bracket partially fills; stop/target qty may mismatch. Monitor Alpaca fill logs for this.\n4. **Max daily loss circuit breaker** \u2014 not currently implemented. Could add: if account equity drops >X% in a day, halt new orders for the session.\n\n**Decision: adjust based on live data, not pre-emptively.** At $150/trade risk, even 3\u00d7 slippage = $450 worst case \u2014 not account-threatening. Watch for patterns in paper trade outcomes first.\n\n### One Remaining Sim vs Bot Gap\nLive sim uses flat $1,500 position size (then compounds). Bot uses tiered sizing on top.\nBot will **outperform** sim on P1/P3 setups with high RVOL + tight IB \u2014 sim underestimates those.\n\n### PDT Rule \u2014 ALREADY FULLY IMPLEMENTED \u2705 (paper_trader_bot.py)\n**Pattern Day Trader rule: <$25k account = max 3 day trades per rolling 5-business-day window.**\n- Paper trading (current): guard auto-bypasses on `IS_PAPER_ALPACA=true` \u2014 no interference\n- Live trading (~May 6): guard is active and enforced\n\n**Implementation (lines 793\u2013812, 970\u2013985):**\n- `_check_pdt_guard()`: reads `daytrade_count` + `equity` directly from Alpaca account API (Alpaca tracks rolling 5-day count natively \u2014 no manual tracking needed)\n- Gate: `if daytrade_count >= PDT_MAX_DAY_TRADES (3) OR pattern_day_trader flag AND equity < $25k` \u2192 block order\n- Blocked **Behavioral Signals:**\n- `voice_signals` JSONB column added to `trade_journal` (migration on startup)\n- 12 boolean columns in journal CSV export (1/0); `followed_plan` signal synced from radio (one-directional)\n\n**Bot vs Trader Convergence Tracker:**\n- `compute_bot_vs_trader_stats()` in backend \u2014 paper_trades + cognitive_delta_log, deduplicated per (date, ticker)\n- Per-day convergence rate, behavioral pattern flags (RVOL bands, TCS bands, per-structure outliers)\n- Linear regression trend over last 30 active days\n- \"Bot vs You\" panel in Paper Trade tab \u2014 KPI cards, convergence chart, per-day breakdown, flags\n- Cognitive Profiler: Convergence Rate added as Dimension 7; 7-spoke radar; old 6-dim profiles default to 50\n\n**Discipline Charts:**\n- Rolling-window picker on both Grade Discipline Curve and Process Discipline Rate charts (Last 5/10/20/All-time)\n- Window choices persist across refresh via URL query params (`gdc_window`, `pdr_window`)\n\n**Location:** `app.py`, `backend.py`, `pages/cognitive_profiler.py`\n\n---\n\n## Apr 18, 2026 \u2014 VWAP Filter: Required \u2192 Optional Toggle (default OFF)\n\n**What changed:** Added \"Require VWAP side alignment\" checkbox (default OFF) to Performance tab \u2192 IB Breakout Simulation. Gates both `_bot_df` (paper trades) and `_bts_bot_df` (batch sim) VWAP filters.\n\n**Why:** VWAP filter was hard-required, removing 2,419/5,271 valid trades (46%). With it OFF: $7.42M projected annual compound. With it ON: $3.6M. Counter-VWAP setups at TCS\u226550 + IB<10% are profitable \u2014 the gate over-filtered.\n\n**Bot:** VWAP check in `paper_trader_bot.py` lines 834\u2013860 was already commented out. Left as reference; uncomment to restore if misaligned setups start underperforming live.\n\n**Location:** `app.py` lines 22794 and 25484 (checkbox + gated filter)\n\n---\n\n## Apr 18, 2026 \u2014 TCS Calibration: Live-First Weighting Fix\n\n**Problem:** `compute_structure_tcs_thresholds()` used pure volume-weighted blending. With 29K backtest vs ~150 journal rows, backtest drowned out live data entirely.\n\n**Fix:** Two-phase logic:\n- Phase 1 (live < 30 trades): Backtest dominates as prior\n- Phase 2 (live \u2265 30 trades): Backtest capped at `live_n \u00d7 2.0`\n\n**Location:** `backend.py` ~line 3737. Constants: `_HIST_CAP_MULT = 2.0`, `_LIVE_MIN_OVERRIDE = 30`\n\n---\n\n## Apr 18, 2026 \u2014 Slippage Decision\n\n**Decision:** 0.75% for small-cap $2\u2013$20 confirmed as correct target. **Implementation held** until first real Alpaca fills (Monday/Tuesday). No point applying before we can validate it against real data.\n\n---\n\n## Apr 18, 2026 \u2014 Filter Funnel Added to BQ Tab\n\n**Location:** `app.py` ~line 24970, inside BQ tab.\nShows progressive filter gates: All \u2192 TCS\u226550 \u2192 +IB<threshold. Each card: WR%, avg R, n=, ~trades/yr. Two Altair bar charts (WR + Expectancy by filter layer).\n\n---\n\n## Apr 18, 2026 \u2014 rvol/gap_pct Write Fix\n\n**Problem:** `gap_pct` was never written to `paper_trades` (0/364 populated). `rvol` and `gap_pct` both missing from `watchlist_predictions` (0/200).\n\n**Fix:** Added `fetch_daily_stats()` to `backend.py` (returns avg_vol + prev_close in one call). Updated `_backtest_single` and `compute_setup_brief` to compute `gap_pct = (open - prev_close) / prev_close \u00d7 100`. Updated `_wpe_payload` in `app.py` to include `gap_pct`.\n\n**Locations:** `backend.py` ~4552, ~8517, ~8578, ~7438, ~7584 | `app.py` ~33331\n\n---\n\n## Apr 18, 2026 \u2014 IB-Range Position Sizing (`_IB_RANGE_MULT`)\n\nTiered position-size multiplier added to bot. Tighter IB \u2192 larger size. See table in Algorithm Core section.\n\n**Location:** `paper_trader_bot.py` lines 405\u2013423\n\n---\n\n## Apr 13, 2026 \u2014 5-Year Backtest Complete\n\n32,685 rows | 1,260 trading days | 85.7% WR | 2.4pp train/test gap across 5 market regimes. See Backtest Validation section. Stage 3 confirmed.\n\n---\n\n## Apr 13, 2026 \u2014 TCS Adjustment Test Results\n\n| TCS Offset | Trades | Net P&L | WR |\n|---|---|---|---|\n| \u221210 (looser) | 438 | $20,825 | 94.1% |\n| 0 (baseline) | 234 | $13,301 | 93.2% |\n| +10 (tighter) | 158 | $10,159 | 93.0% |\n\n**Key insight:** TCS correlates with follow-through SIZE, not direction accuracy. Profit Factor = \u221e at all levels because losing trades have 0 follow-through = no fill = $0 loss (not a bug \u2014 no break = no entry in live trading). Sweet spot: offset 0 or +5 for live.\n\n---\n\n## Apr 12, 2026 \u2014 MAE/MFE Built\n\nMAE and MFE computed in `_backtest_single()`, logged in paper trades. Displayed in Analytics tab with MFE:MAE ratio, money-left-on-table metric, by-structure breakdown, exit trigger analysis.\n\n---\n\n## Apr 12, 2026 \u2014 Inside Bar Pattern Built\n\n---\n\n## Apr 12, 2026 \u2014 Supabase Pagination Fix\n\nBefore: loading 1,000 rows max (API hard cap). After: paginated while loop fetches all pages. Now loads all 6,180 morning rows correctly.\n\n---\n\n## Apr 12, 2026 \u2014 RVOL Scanner Filter Built\n\n`min_rvol` slider in sidebar (default 2.0\u00d7, SIP feed only). Tickers with unknown RVOL kept.\n\n---\n\n## Apr 11, 2026 \u2014 Structure WR Correction\n\nTrue accuracy after filtering '\u2014' non-predictions: **40.7% (33/81)**. The inflated 71.6% / 121/169 figures are wrong \u2014 do not cite.\n\n---\n\n## Apr 10, 2026 \u2014 Paper Trader Bot Launch\n\nBot confirmed connected (HTTP 200), watching 45 tickers from live Supabase watchlist. Schedule: 10:35 AM scan, 4:05 PM EOD, 4:10 PM recalibration. VWAP filter was enabled at launch (disabled Apr 18).\n\n---\n\n## Apr 8, 2026 \u2014 Adaptive Learning Loop\n\nVolume-weighted source blending added to `recalibrate_from_supabase()`. MIN_SAMPLES scales with total data: 3 (<50 trades) \u2192 12 (500+). EMA learning rate scales: 0.10 (<10/structure) \u2192 0.40 (100+/structure).\n\n---\n\n## Apr 6, 2026 \u2014 Batch Calibration Run + Tier 3 Pattern Detection\n\nOne-click batch calibration built. H&S, reverse H&S, double bottom/top, cup & handle, bull/bear flag with confluence scoring added.\n\n</div>\n\n---\n\n<div class=\"bn-section bn-marketing\">\n\n# \ud83d\udce3 MARKETING STRATEGY\n\n## The Core Insight\nEdgeIQ's marketing advantage is that the **product creates content**. Every day, the bot generates timestamped predictions that can be screenshotted and shared. The audit trail IS the marketing.\n\n## Channel Priority\n1. **Reddit** (highest ROI): r/daytrading, r/volumeprofile, r/algotrading. Post data, not pitches. \"I tracked 287 predictions over 38 days. Here's the accuracy breakdown.\" CTA: \"Opening beta to 25 people \u2014 DM.\"\n2. **Twitter/X:** Start NOW \u2014 post the journey, not the system. 60\u201390 days of pre-launch audience building changes conversion rate dramatically.\n3. **Discord:** Join 5\u201310 small-cap/day trading Discords. Become the \"volume profile guy.\"\n4. **YouTube:** Weekly 5\u201310 min \"bot's morning predictions vs EOD actual\" videos.\n\n## What to never post\n- TCS formula or any component\n- Brain weight logic\n- Specific signal rules\n- Backtest methodology in detail\n- Anything that allows reverse-engineering\n\n## Growth Phases\n| Phase | Timeline | Budget | Expected Users |\n|---|---|---|---|\n| Organic | Months 1\u20133 | $0 | 25\u201350 beta |\n| Paid Beta | Months 3\u20136 | $0\u2013500/mo | 50\u2013100 paying |\n| Scale | Months 6\u201312 | $500\u20131,500/mo | 300\u2013500 paying |\n| Flywheel | Month 12+ | $1,000\u20133,000/mo | 1,000+ |\n\n**Total Year 1 marketing spend:** $3,000\u2013$12,000 | **Expected ARR end Year 1:** $60\u2013120K | **CAC:** $6\u201324/user\n\n</div>\n\n---\n\n<div class=\"bn-section bn-preserved\">\n\n# \ud83d\udd12 TECHNICAL REFERENCE\n\n## Key Files\n| File | Purpose |\n|---|---|\n| `app.py` | All UI/rendering (~35K lines) |\n| `backend.py` | All math/logic/data fetching |\n| `paper_trader_bot.py` | Autonomous trading bot |\n| `batch_backtest.py` | 5-year backtest runner |\n| `brain_weights.json` | Per-structure confidence weights |\n| `adaptive_exits.json` | rvol_size_tiers for position sizing |\n| `.local/build_notes.md` | This file |\n\n## Database Tables\n| Table | Purpose |\n|---|---|\n| `backtest_sim_runs` | 32,685 rows of historical backtest data |\n| `paper_trades` | Live bot trades (w/ pnl_r_sim, eod_pnl_r, tiered_pnl_r) |\n| `watchlist_predictions` | Daily structure predictions + EOD verification |\n| `accuracy_tracker` | Verified prediction outcomes (brain calibration) |\n| `ticker_rankings` | Nightly 0\u20135 ranking + next-day auto-verify |\n| `user_preferences` | Brain weights per user (prefs[\"brain_weights\"]) |\n| `app_config` | IB range threshold + other configurable settings |\n\n## Preview URL Map\n- **Main app (port 8080):** `python3 deploy_server.py` \u2192 proxy to Streamlit on 8501\n- **EdgeIQ Dashboard (dev):** `/edgeiq/` on port 23411 (edgeiq-old artifact)\n- **React api-server:** port 3001 (system health only, not main app)\n\n## Historical Data Providers\n| Provider | Cost | Notes |\n|---|---|---|\n| Alpaca (current) | $99/mo | 5+ yr minute bars with Algo Trader Plus |\n| Tiingo | $10/mo | Fixes survivorship bias (delisted tickers) \u2014 buy ~April 22 |\n| Polygon.io | $29/mo+ | Alternative 5-yr minute bar source |\n| Nasdaq Data Link | $50/mo+ | Point-in-time historical screener snapshots |\n\n## Known Issues\n| Issue | Priority |\n|---|---|\n| April 5 predictions in Supabase (Saturday) | Low \u2014 unverifiable junk data, ignore |\n| IB 1\u20133 cent gap vs Webull | Unfixable \u2014 data feed fragmentation; use IB Override |\n| Historical rvol/gap_pct missing pre-Apr 18 | Low \u2014 columns exist, just not backfilled |\n\n</div>\n\n---\n\n## \ud83d\udcca BOT PAPER TRADE LOG\n\n| Date | Ticker | TCS | Predicted | Actual | W/L | Follow-thru % |\n|---|---|---|---|---|---|---|\n| 2026-04-18 | \u2014 | \u2014 | No setups logged | \u2014 | \u2014 | \u2014 |\n\n---\n\n## \ud83d\udcb0 BOT P&L LOG\n\n| Date | Wins | Losses |
